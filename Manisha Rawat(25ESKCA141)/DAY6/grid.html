<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

    <div class="container py-5">
        <h2 class="text-center mb-4">Student Records</h2>

        <input type="text" id="search" class="form-control mb-4"
         placeholder="Search Student">

        <div id="container" class="row g-4"></div>
        <div id="JSON"></div>
    </div>

    <script>
        const students = [
            { name: "Mahak", branch: "CSE", cgpa: 8.4 },
            { name: "Shreya", branch: "IT", cgpa: 9.0 },
            { name: "Gunjan", branch: "IT", cgpa: 9.4 },
            { name: "Priyanshu", branch: "IT", cgpa: 7.0 },
            { name: "Radha", branch: "AI", cgpa: 8.0 },
            { name: "Himanshu", branch: "ECE", cgpa: 9.8 },
            { name: "Dhruv", branch: "AI", cgpa: 8.0 },
            { name: "Maedhavi", branch: "CSE", cgpa: 8.2 },
            { name: "Mahi", branch: "IT", cgpa: 8.0 },
            { name: "Tanisha", branch: "CSE", cgpa: 8.9 }
        ];

        let html = "";

        for (let i = 0; i < students.length; i++) {
            html += `
                <div class="col-md-4 card-item">
                    <div class="card shadow">
                        <div class="card-body">
                            <h4>${students[i].name}</h4>

                            <button class="btn btn-primary btn-sm mt-2">
                                Show Details
                            </button>

                            <div class="details mt-3" style="display:none;">
                                <p><strong>Branch:</strong> ${students[i].branch}</p>
                                <p><strong>CGPA:</strong> ${students[i].cgpa}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        document.getElementById("container").innerHTML = html;

        // Show/Hide Details
        $(document).on("click", ".btn", function () {
            $(this).next(".details").toggle();
        });

        // Search Student
        $("#search").on("keyup", function () {
            let value = $(this).val().toLowerCase();


            $(".card-item").filter(function () {
                $(this).toggle(
                    $(this).text().toLowerCase().indexOf(value) > -1
                );
            });
        });
        document.getElementById("json").innerHTML=JSON .stringify(students,["name","cgpa"],4);
    </script>

</body>
</html>
