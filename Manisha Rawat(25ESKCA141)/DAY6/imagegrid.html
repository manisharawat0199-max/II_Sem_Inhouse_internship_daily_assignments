```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records with API Images</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            background:#f8f9fa;
        }

        .card{
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .card img{
            height:250px;
            object-fit:cover;
        }

        #json{
            margin-top:40px;
            background:#fff;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
    </style>

</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-4">Student Records</h2>

    <input
        type="text"
        id="search"
        class="form-control mb-4"
        placeholder="Search Student..."
    >

    <div id="container" class="row g-4"></div>

    <h3 class="mt-5">JSON Data</h3>
    <div id="json"></div>

</div>

<script>

// Student Data
const students = [
    { name: "Mahak", branch: "CSE", cgpa: 8.4, gender: "female" },
    { name: "Shreya", branch: "IT", cgpa: 9.0, gender: "female" },
    { name: "Gunjan", branch: "IT", cgpa: 9.4, gender: "female" },
    { name: "Priyanshu", branch: "IT", cgpa: 7.0, gender: "male" },
    { name: "Radha", branch: "AI", cgpa: 8.0, gender: "female" },
    { name: "Himanshu", branch: "ECE", cgpa: 9.8, gender: "male" },
    { name: "Dhruv", branch: "AI", cgpa: 8.0, gender: "male" },
    { name: "Maedhavi", branch: "CSE", cgpa: 8.2, gender: "female" },
    { name: "Mahi", branch: "IT", cgpa: 8.0, gender: "female" },
    { name: "Tanisha", branch: "CSE", cgpa: 8.9, gender: "female" }
];

// Fetch Images from Random User API
$.when(
    $.get("https://randomuser.me/api/?results=3&gender=male"),
    $.get("https://randomuser.me/api/?results=7&gender=female")
).done(function(maleData, femaleData){

    let males = maleData[0].results;
    let females = femaleData[0].results;

    let maleIndex = 0;
    let femaleIndex = 0;

    let html = "";

    students.forEach(function(student){

        let image = "";

        if(student.gender === "male"){
            image = males[maleIndex].picture.large;
            maleIndex++;
        }
        else{
            image = females[femaleIndex].picture.large;
            femaleIndex++;
        }

        html += `
        <div class="col-md-4 card-item">

            <div class="card shadow h-100">

                <img src="${image}" class="card-img-top">

                <div class="card-body text-center">

                    <h4>${student.name}</h4>

                    <button class="btn btn-primary">
                        Show Details
                    </button>

                    <div class="details mt-3" style="display:none;">

                        <p><strong>Branch:</strong> ${student.branch}</p>

                        <p><strong>CGPA:</strong> ${student.cgpa}</p>

                    </div>

                </div>

            </div>

        </div>
        `;

    });

    $("#container").html(html);

});

// Show / Hide Details
$(document).on("click",".btn-primary",function(){

    $(this).next(".details").slideToggle();

});

// Search Student
$("#search").on("keyup",function(){

    let value = $(this).val().toLowerCase();

    $(".card-item").filter(function(){

        $(this).toggle(
            $(this).text().toLowerCase().indexOf(value) > -1
        );

    });

});

// Show JSON Data
document.getElementById("json").innerHTML =
"<pre>"+JSON.stringify(students,["name","cgpa"],4)+"</pre>";

</script>

</body>
</html>
